<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Proposal</title><style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#ff9ec4,#ffd6e8);font-family:Arial;overflow:hidden}
.c{text-align:center}#t{font-size:2rem;color:#fff}#t:after{content:'|';animation:b .8s infinite}
button{padding:12px 24px;border:none;border-radius:24px;margin:8px;font-size:18px;cursor:pointer}
#y{background:#ff4d88;color:#fff}#n{background:#fff;color:#ff4d88;position:relative}
.h{position:absolute;animation:f 5s linear forwards}
@keyframes b{50%{opacity:0}}@keyframes f{from{transform:translateY(-100vh)}to{transform:translateY(100vh);opacity:0}}
</style></head><body><div class='c'><div style='font-size:80px'>🧸🌹</div><h1 id='t'></h1><button id='y'>Yes ❤️</button><button id='n'>No 😅</button></div>
<script>
let s='Will You Be My Girlfriend? 💖',i=0;function ty(){if(i<s.length){t.innerHTML+=s[i++];setTimeout(ty,80)}};ty();
n.onclick=()=>{n.style.position='absolute';n.style.left=Math.random()*80+'vw';n.style.top=Math.random()*80+'vh';}
y.onclick=()=>document.body.innerHTML='<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:white;font-family:Arial"><div><h1>YAY!! ❤️</h1><h2>You made my day!</h2></div></div>';
setInterval(()=>{let d=document.createElement('div');d.className='h';d.textContent='❤️';d.style.left=Math.random()*100+'vw';document.body.appendChild(d);setTimeout(()=>d.remove(),5000)},250);
</script></body></html>
