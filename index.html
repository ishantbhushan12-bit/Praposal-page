<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>joru ka gulam....❤️❤️</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(to right,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
}

.box{
background:white;
color:black;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
width:90%;
max-width:400px;
}

h1{
color:#ff3366;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

#yes{
background:#ff3366;
color:white;
}

#no{
background:gray;
color:white;
position:absolute;
}

</style>
</head>

<body>

<div class="box">
<h1>I am so sorry..</h1>

<h2>Nandu... 🥺❤️
Sach mein dil se sorry. Please mujhse naraz mat raho. Tumhari smile meri liye bahut important hai. 🤍</h2>

<button id="yes" onclick="yes()">YES ❤️</button>
<button id="no" onmouseover="move()">NO 😅</button>

<p id="msg"></p>

</div>

<script>

function yes(){
document.getElementById("msg").innerHTML="Yayyy jao maff kiya aage se Dhyan rakhna..👸";
}

function move(){
let btn=document.getElementById("no");

btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";
btn.style.position="absolute";
}

</script>

</body>
</html>
